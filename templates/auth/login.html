{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🔐</span>
            <h1>Welcome Back</h1>
            <p>Login to your Asara News account</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>📱 Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter your phone number" required value="{{ request.form.get('phone', '') }}">
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full">Login →</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register Now</a></p>
        </div>
    </div>
</div>
{% endblock %}
