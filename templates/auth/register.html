{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">📝</span>
            <h1>Create Account</h1>
            <p>Join Asara News community</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" name="username" placeholder="Choose a username" required minlength="3" value="{{ username|default('') }}">
            </div>
            <div class="form-group">
                <label>📱 Phone Number</label>
                <input type="tel" name="phone" placeholder="Your mobile number" required minlength="10" value="{{ phone|default('') }}">
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Minimum 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label>🔒 Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full">Send OTP →</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
